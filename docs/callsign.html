<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HamShack — Callsign Lookup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
<div class="bg-glow"></div>
<nav class="navbar navbar-expand-lg navbar-dark tp-navbar">
  <div class="container-fluid">
    <a class="navbar-brand tp-brand" href="index.html"><i class="fa-solid fa-tower-broadcast me-2"></i>HAMSHACK</a>
    <span class="navbar-text tp-callsign me-3" id="navCallsign">—</span>
    <button class="btn btn-sm ms-1" onclick="HS.openSettings()" style="color:var(--text-faint);background:none;border:1px solid var(--border);border-radius:8px;padding:3px 10px" title="Station settings"><i class="fa-solid fa-gear"></i></button>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="fa-solid fa-gauge-high me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="repeaters.html"><i class="fa-solid fa-radio me-1"></i>Repeaters</a></li>
        <li class="nav-item"><a class="nav-link" href="hf.html"><i class="fa-solid fa-sun me-1"></i>HF Propagation</a></li>
        <li class="nav-item"><a class="nav-link" href="dx.html"><i class="fa-solid fa-satellite-dish me-1"></i>DX Cluster</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"><i class="fa-solid fa-screwdriver-wrench me-1"></i>Tools</a>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" href="callsign.html"><i class="fa-solid fa-id-card me-2"></i>Callsign Lookup</a></li>
            <li><a class="dropdown-item" href="antenna.html"><i class="fa-solid fa-wifi me-2"></i>Antenna Calculator</a></li>
            <li><a class="dropdown-item" href="bandplan.html"><i class="fa-solid fa-chart-bar me-2"></i>Band Plan</a></li>
          </ul>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item"><span class="navbar-text tp-utc" id="utcClock">UTC --:--:--</span></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4" style="max-width:700px">
  <h1 class="tp-page-title mb-4"><i class="fa-solid fa-id-card me-2"></i>Callsign Lookup</h1>

  <div class="tp-card mb-4">
    <form id="lookupForm" onsubmit="lookup(event)">
      <div class="d-flex gap-2">
        <input type="text" id="callInput" class="form-control tp-form-control" placeholder="e.g. VA3CZT, W1AW, DL1ABC…"
               style="font-family:'JetBrains Mono',monospace;font-size:1rem;letter-spacing:1px"
               autocomplete="off" autocapitalize="characters" spellcheck="false">
        <button type="submit" class="btn btn-tp px-4"><i class="fa-solid fa-magnifying-glass me-1"></i>Look up</button>
      </div>
    </form>
  </div>

  <div id="resultDiv"></div>

  <div style="font-size:0.75rem;color:var(--text-faint);margin-top:1rem">
    US callsigns: <a href="https://callook.info" target="_blank" style="color:var(--cyan)">callook.info</a> (FCC ULS database) ·
    Non-US: <a href="https://www.qrz.com" target="_blank" style="color:var(--cyan)">QRZ.com</a> for full details
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function updateClock(){const n=new Date(),h=String(n.getUTCHours()).padStart(2,'0'),m=String(n.getUTCMinutes()).padStart(2,'0'),s=String(n.getUTCSeconds()).padStart(2,'0');document.getElementById('utcClock').textContent=`UTC ${h}:${m}:${s}`;}
updateClock();setInterval(updateClock,1000);
document.querySelectorAll('.nav-link:not(.dropdown-toggle),.dropdown-item').forEach(a=>{if(a.getAttribute('href')===(location.pathname.split('/').pop()||'index.html'))a.classList.add('active');});

function row(label,val){if(!val)return'';return`<tr><td style="color:var(--text-faint);font-size:0.82rem;padding:0.45rem 0.9rem;width:140px">${label}</td><td style="font-size:0.88rem;padding:0.45rem 0.9rem">${val}</td></tr>`;}

async function lookup(e){
  e.preventDefault();
  const call=document.getElementById('callInput').value.trim().toUpperCase();
  if(!call)return;
  document.getElementById('resultDiv').innerHTML=`<div class="text-center py-4"><div class="tp-spinner mx-auto"></div></div>`;

  // Detect prefix to choose source
  const isUS=/^[AKNWw]/.test(call);

  if(isUS){
    try{
      const r=await fetch(`https://callook.info/${call}/json`);
      const d=await r.json();
      if(d.status==='VALID'){
        const addr=[d.address?.line1,d.address?.line2].filter(Boolean).join(', ');
        document.getElementById('resultDiv').innerHTML=`
          <div class="tp-card">
            <div class="d-flex align-items-center gap-3 mb-3">
              <div style="font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--cyan)">${call}</div>
              <div>
                <div style="font-size:1rem;font-weight:600">${d.name||'—'}</div>
                <div style="font-size:0.82rem;color:var(--text-faint)">${d.type||''} · FCC ULS</div>
              </div>
            </div>
            <table class="table tp-table mb-2">
              <tbody>
                ${row('Class',d.current?.operClass)}
                ${row('Grid',d.location?.gridsquare)}
                ${row('Address',addr)}
                ${row('Latitude',d.location?.latitude)}
                ${row('Longitude',d.location?.longitude)}
                ${row('Trustee',d.trustee?.callsign?d.trustee.callsign+' — '+d.trustee.name:null)}
                ${row('Expiry',d.otherInfo?.expiryDate)}
              </tbody>
            </table>
            <a href="https://www.qrz.com/db/${call}" target="_blank" class="btn btn-tp-outline btn-sm mt-1">
              <i class="fa-solid fa-arrow-up-right-from-square me-1"></i>Full profile on QRZ.com
            </a>
          </div>`;
      }else{
        document.getElementById('resultDiv').innerHTML=`<div class="alert alert-warning">Callsign <b>${call}</b> not found in the FCC database.</div>`;
      }
    }catch(err){
      document.getElementById('resultDiv').innerHTML=`<div class="alert alert-danger">Lookup failed: ${err.message}</div>`;
    }
  }else{
    // Non-US — link to QRZ since callook.info is US-only
    const prefix=call.match(/^[A-Z0-9]+/)?.[0]||call.slice(0,3);
    document.getElementById('resultDiv').innerHTML=`
      <div class="tp-card">
        <div style="font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--cyan);margin-bottom:0.5rem">${call}</div>
        <div class="alert" style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--yellow);border-radius:8px;font-size:0.85rem">
          <i class="fa-solid fa-circle-info me-2"></i>
          <b>${call}</b> appears to be a non-US callsign (prefix: ${prefix}).
          Full details including name and address are available on QRZ.com.
        </div>
        <a href="https://www.qrz.com/db/${call}" target="_blank" class="btn btn-tp">
          <i class="fa-solid fa-arrow-up-right-from-square me-1"></i>Look up ${call} on QRZ.com
        </a>
      </div>`;
  }
}

// Pre-fill with VA3CZT as a demo
window.addEventListener('DOMContentLoaded',()=>{
  const params=new URLSearchParams(location.search);
  const c=params.get('call');
  if(c){document.getElementById('callInput').value=c;document.getElementById('lookupForm').dispatchEvent(new Event('submit'));}
});
</script>
<script src="settings.js"></script>
</body>
</html>
