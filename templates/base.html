<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HamShack — {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark tp-navbar">
  <div class="container-fluid">
    <a class="navbar-brand tp-brand" href="/">
      <i class="fa-solid fa-tower-broadcast me-2"></i>HAMSHACK
    </a>
    {% if settings.callsign %}
    <span class="navbar-text tp-callsign me-3">{{ settings.callsign }}</span>
    {% endif %}
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="fa-solid fa-gauge-high me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/repeaters' %}active{% endif %}" href="/repeaters">
            <i class="fa-solid fa-radio me-1"></i>Repeaters
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/hf' %}active{% endif %}" href="/hf">
            <i class="fa-solid fa-sun me-1"></i>HF Propagation
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/log' %}active{% endif %}" href="/log">
            <i class="fa-solid fa-book me-1"></i>Contact Log
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/aprs' %}active{% endif %}" href="/aprs">
            <i class="fa-solid fa-map-location-dot me-1"></i>APRS
          </a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <span class="navbar-text tp-utc" id="utcClock">UTC --:--:--</span>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/settings' %}active{% endif %}" href="/settings" title="Settings">
            <i class="fa-solid fa-gear"></i>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function updateClock() {
    const now = new Date();
    const h = String(now.getUTCHours()).padStart(2,'0');
    const m = String(now.getUTCMinutes()).padStart(2,'0');
    const s = String(now.getUTCSeconds()).padStart(2,'0');
    document.getElementById('utcClock').textContent = `UTC ${h}:${m}:${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
